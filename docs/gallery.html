<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Learning Gallery - String Art Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .filters {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-label {
            font-weight: bold;
            color: #374151;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .filter-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
        }
        
        .stats-summary {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #6b7280;
            margin-top: 5px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        
        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .version-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .version-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .version-badge.best {
            background: #10b981;
        }
        
        .version-badge.failed {
            background: #ef4444;
        }
        
        .ssim-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .ssim-badge.excellent {
            background: #d1fae5;
            color: #065f46;
        }
        
        .ssim-badge.good {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .ssim-badge.fair {
            background: #fef3c7;
            color: #92400e;
        }
        
        .ssim-badge.poor {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .result-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #374151;
            margin-bottom: 10px;
        }
        
        .result-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #6b7280;
        }
        
        .meta-item {
            display: flex;
            justify-content: space-between;
        }
        
        .meta-label {
            font-weight: 500;
        }
        
        .meta-value {
            font-weight: bold;
            color: #374151;
        }
        
        .result-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .result-image:hover {
            transform: scale(1.05);
        }
        
        .result-image.lazy {
            background: #f3f4f6;
            min-height: 300px;
        }
        
        .result-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            display: block;
        }
        
        .view-svg {
            background: #667eea;
            color: white;
        }
        
        .view-svg:hover {
            background: #5568d3;
        }
        
        .view-png {
            background: #10b981;
            color: white;
        }
        
        .view-png:hover {
            background: #059669;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            color: #6b7280;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        
        .modal-image {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 10px;
        }
        
        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: white;
            color: #374151;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .modal-close:hover {
            background: #f3f4f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Main</a>
        
        <h1>🤖 Self-Learning Gallery</h1>
        <p class="subtitle">All autonomous improvements with quality metrics</p>
        
        <div class="stats-summary" id="stats">
            <div class="stat-item">
                <div class="stat-value" id="total-count">-</div>
                <div class="stat-label">Total Results</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="best-ssim">-</div>
                <div class="stat-label">Best SSIM</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="avg-time">-</div>
                <div class="stat-label">Avg Time</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="success-rate">-</div>
                <div class="stat-label">Success Rate</div>
            </div>
        </div>
        
        <div class="filters">
            <span class="filter-label">Filter:</span>
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="excellent">Excellent (SSIM ≥ 0.25)</button>
            <button class="filter-btn" data-filter="good">Good (SSIM ≥ 0.20)</button>
            <button class="filter-btn" data-filter="failed">Failed</button>
        </div>
        
        <div class="gallery" id="gallery">
            <div class="loading">Loading results...</div>
        </div>
        
        <div style="text-align: center; margin: 40px 0;">
            <button id="load-more" class="filter-btn" style="display: none; padding: 12px 32px; font-size: 1.1em;">
                Load More Results
            </button>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕ Close</button>
            <img class="modal-image" id="modal-image" src="" alt="">
        </div>
    </div>
    
    <script>
        // Results data - will be populated by scanning docs/ folder
        let results = [];
        let currentFilter = 'all';
        let currentPage = 0;
        const RESULTS_PER_PAGE = 12;
        
        // Scan docs/ folder for result files
        async function loadResults() {
            try {
                const response = await fetch('results_manifest.json');
                results = await response.json();
                renderStats();
                renderGallery();
            } catch (error) {
                console.error('Error loading results:', error);
                document.getElementById('gallery').innerHTML = '<div class="no-results">No results found. Self-learning will populate this gallery automatically.</div>';
            }
        }
        
        function renderStats() {
            const totalCount = results.length;
            const successResults = results.filter(r => !r.failed);
            const bestSSIM = Math.max(...results.map(r => r.ssim || 0));
            const avgTime = (results.reduce((sum, r) => sum + (r.time || 0), 0) / totalCount).toFixed(1);
            const successRate = ((successResults.length / totalCount) * 100).toFixed(0);
            
            document.getElementById('total-count').textContent = totalCount;
            document.getElementById('best-ssim').textContent = bestSSIM.toFixed(4);
            document.getElementById('avg-time').textContent = avgTime + 's';
            document.getElementById('success-rate').textContent = successRate + '%';
        }
        
        function renderGallery(append = false) {
            const gallery = document.getElementById('gallery');
            const loadMoreBtn = document.getElementById('load-more');
            
            let filteredResults = results;
            if (currentFilter === 'excellent') {
                filteredResults = results.filter(r => r.ssim >= 0.25);
            } else if (currentFilter === 'good') {
                filteredResults = results.filter(r => r.ssim >= 0.20);
            } else if (currentFilter === 'failed') {
                filteredResults = results.filter(r => r.failed);
            }
            
            if (filteredResults.length === 0) {
                gallery.innerHTML = '<div class="no-results">No results match this filter.</div>';
                loadMoreBtn.style.display = 'none';
                return;
            }
            
            // Sort by version (newest first)
            filteredResults.sort((a, b) => {
                const versionA = parseInt(a.version.replace('v', ''));
                const versionB = parseInt(b.version.replace('v', ''));
                return versionB - versionA;
            });
            
            // Pagination
            const startIndex = append ? currentPage * RESULTS_PER_PAGE : 0;
            const endIndex = startIndex + RESULTS_PER_PAGE;
            const pageResults = filteredResults.slice(startIndex, endIndex);
            
            if (!append) {
                currentPage = 0;
                gallery.innerHTML = '';
            }
            
            const cardsHTML = pageResults.map((result, index) => {
                const ssimClass = result.ssim >= 0.25 ? 'excellent' : 
                                 result.ssim >= 0.20 ? 'good' : 
                                 result.ssim >= 0.15 ? 'fair' : 'poor';
                
                const versionClass = result.failed ? 'failed' : 
                                    result.ssim >= 0.25 ? 'best' : '';
                
                return `
                    <div class="result-card" style="animation-delay: ${index * 0.05}s">
                        <div class="version-header">
                            <span class="version-badge ${versionClass}">${result.version}</span>
                            <span class="ssim-badge ${ssimClass}">SSIM: ${result.ssim.toFixed(4)}</span>
                        </div>
                        
                        <div class="result-title">${result.description}</div>
                        
                        <div class="result-meta">
                            <div class="meta-item">
                                <span class="meta-label">Quality:</span>
                                <span class="meta-value">${result.quality}/10</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Time:</span>
                                <span class="meta-value">${result.time}s</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Pins:</span>
                                <span class="meta-value">${result.pins}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Lines:</span>
                                <span class="meta-value">${result.lines}</span>
                            </div>
                        </div>
                        
                        <img 
                            class="result-image" 
                            src="${result.png}" 
                            alt="${result.version}"
                            onclick="openModal('${result.svg}')"
                            onerror="this.src='${result.svg}'"
                        >
                        
                        <div class="result-actions">
                            <a href="${result.svg}" class="action-btn view-svg" target="_blank">View SVG</a>
                            <a href="${result.png}" class="action-btn view-png" target="_blank">View PNG</a>
                        </div>
                    </div>
                `;
            }).join('');
            
            if (append) {
                gallery.innerHTML += cardsHTML;
            } else {
                gallery.innerHTML = cardsHTML;
            }
            
            // Show/hide load more button
            if (endIndex < filteredResults.length) {
                loadMoreBtn.style.display = 'inline-block';
            } else {
                loadMoreBtn.style.display = 'none';
            }
            
            currentPage++;
        }
        
        function lazyLoadImages() {
            const images = document.querySelectorAll('.result-image.lazy');
            
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.classList.remove('lazy');
                        observer.unobserve(img);
                    }
                });
            });
            
            images.forEach(img => imageObserver.observe(img));
        }
        
        function openModal(imageSrc) {
            document.getElementById('modal-image').src = imageSrc;
            document.getElementById('modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.id === 'load-more') return; // Skip load more button
                
                document.querySelectorAll('.filter-btn').forEach(b => {
                    if (b.id !== 'load-more') b.classList.remove('active');
                });
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                currentPage = 0;
                renderGallery();
            });
        });
        
        // Load more button
        document.getElementById('load-more').addEventListener('click', () => {
            renderGallery(true);
        });
        
        // Close modal on click outside
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });
        
        // Load results on page load
        loadResults();
    </script>
</body>
</html>
