<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Viewer - String Art Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: white;
            overflow: hidden;
        }
        
        .controls {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 2px solid #667eea;
        }
        
        .controls h1 {
            font-size: 1.2em;
            color: #667eea;
        }
        
        .controls .buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: #764ba2;
        }
        
        .btn.secondary {
            background: #555;
        }
        
        .btn.secondary:hover {
            background: #777;
        }
        
        .svg-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            overflow: auto;
        }
        
        .svg-container object {
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 0.9em;
            z-index: 1000;
        }
        
        .info p {
            margin: 5px 0;
            color: #ccc;
        }
        
        .info strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h1>🎨 String Art SVG Viewer</h1>
        <div class="buttons">
            <button class="btn secondary" onclick="window.location.href='index.html'">← Back</button>
            <button class="btn" onclick="downloadSVG()">Download SVG</button>
            <button class="btn secondary" onclick="toggleBackground()">Toggle BG</button>
        </div>
    </div>
    
    <div class="svg-container" id="svgContainer">
        <object id="svgObject" data="examples/cat_photo_stringart_20260502_143518.svg" type="image/svg+xml">
            Your browser does not support SVG
        </object>
    </div>
    
    <div class="info">
        <p><strong>Version:</strong> 2.0.0 (Edge-aware)</p>
        <p><strong>Format:</strong> SVG (Scalable Vector Graphics)</p>
        <p><strong>Dimensions:</strong> 600mm × 600mm</p>
        <p><strong>Stroke:</strong> 0.18mm, opaque</p>
        <p><strong>Lines:</strong> 2000 strings (optimized)</p>
        <p><strong>Pins:</strong> 200 circular</p>
        <p style="margin-top: 10px; color: #667eea;">💡 Use browser zoom (Ctrl/Cmd + scroll) for infinite detail</p>
    </div>
    
    <script>
        function downloadSVG() {
            const link = document.createElement('a');
            link.href = 'examples/cat_photo_stringart_20260502_143518.svg';
            link.download = 'string_art_cat_v2_600x600mm.svg';
            link.click();
        }
        
        let bgWhite = true;
        function toggleBackground() {
            const container = document.getElementById('svgContainer');
            if (bgWhite) {
                container.style.background = '#1a1a1a';
                bgWhite = false;
            } else {
                container.style.background = 'white';
                bgWhite = true;
            }
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                window.location.href = 'index.html';
            } else if (e.key === 'd' || e.key === 'D') {
                downloadSVG();
            } else if (e.key === 'b' || e.key === 'B') {
                toggleBackground();
            }
        });
    </script>
</body>
</html>
